name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.2.0"
        required: true
        type: string

concurrency:
  group: release-binaries
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: |
          go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.event.inputs.tag_name || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          build() {
            goos="$1"
            goarch="$2"
            asset="$3"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags "-s -w -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Version=${VERSION} -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Commit=${COMMIT} -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "dist/$asset" ./cmd/qiaoya
          }
          build darwin arm64 qiaoya-darwin-arm64
          build darwin amd64 qiaoya-darwin-amd64
          build linux amd64 qiaoya-linux-amd64
          build linux arm64 qiaoya-linux-arm64
          build windows amd64 qiaoya-windows-amd64.exe
          build windows arm64 qiaoya-windows-arm64.exe

      - name: Verify Linux binary
        run: |
          ./dist/qiaoya-linux-amd64 --help

      - name: Generate checksums
        env:
          VERSION: ${{ github.event.inputs.tag_name || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          cd dist
          sha256sum qiaoya-* > checksums.txt
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "commit": "${COMMIT}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "downloadBaseUrl": "https://code.xhyovo.cn/downloads/qiaoya/latest",
            "installCommand": "curl -fsSL https://code.xhyovo.cn/install | sh",
            "installCommands": {
              "darwin": "curl -fsSL https://code.xhyovo.cn/install | sh",
              "linux": "curl -fsSL https://code.xhyovo.cn/install | sh",
              "windows": "irm https://code.xhyovo.cn/install.ps1 | iex"
            }
          }
          EOF

      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiaoya-release-assets
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p flattened
          find release-assets -maxdepth 2 -type f -exec cp {} flattened/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: flattened/*
          generate_release_notes: true

  deploy-server:
    needs: release
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.QIAOYA_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.QIAOYA_DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.QIAOYA_DEPLOY_KEY }}
      DEPLOY_PORT: ${{ secrets.QIAOYA_DEPLOY_PORT }}
      DEPLOY_ROOT: ${{ secrets.QIAOYA_DEPLOY_ROOT }}
      VERSION: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p flattened
          find release-assets -maxdepth 2 -type f -exec cp {} flattened/ \;

      - name: Check deploy secrets
        id: deploy-check
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "缺少 QIAOYA_DEPLOY_HOST / QIAOYA_DEPLOY_USER / QIAOYA_DEPLOY_KEY，跳过服务器同步。"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/qiaoya_deploy_key
          chmod 600 ~/.ssh/qiaoya_deploy_key
          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release assets
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          port="${DEPLOY_PORT:-22}"
          remote_root="${DEPLOY_ROOT:-/www/wwwroot/code.xhyovo.cn/downloads/qiaoya}"
          cp scripts/install.sh flattened/install.sh
          cp scripts/install.ps1 flattened/install.ps1
          tar -C flattened -czf "qiaoya-release-${VERSION}.tar.gz" .
          ssh -i ~/.ssh/qiaoya_deploy_key -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$remote_root/incoming/$VERSION'"
          scp -O -i ~/.ssh/qiaoya_deploy_key -P "$port" "qiaoya-release-${VERSION}.tar.gz" "$DEPLOY_USER@$DEPLOY_HOST:$remote_root/incoming/$VERSION/release.tar.gz"

      - name: Publish server assets
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          port="${DEPLOY_PORT:-22}"
          remote_root="${DEPLOY_ROOT:-/www/wwwroot/code.xhyovo.cn/downloads/qiaoya}"
          ssh -i ~/.ssh/qiaoya_deploy_key -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "REMOTE_ROOT='$remote_root' VERSION='$VERSION' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$REMOTE_ROOT/incoming/$VERSION"
          tar -xzf release.tar.gz
          rm -f release.tar.gz
          sha256sum -c checksums.txt
          mkdir -p "$REMOTE_ROOT/releases/$VERSION" "$REMOTE_ROOT/latest"
          cp -f qiaoya-* checksums.txt version.json install.sh install.ps1 "$REMOTE_ROOT/releases/$VERSION/"
          cp -f qiaoya-* checksums.txt version.json "$REMOTE_ROOT/latest/"
          cp -f install.sh "$REMOTE_ROOT/install.sh"
          cp -f install.ps1 "$REMOTE_ROOT/install.ps1"
          chmod 755 "$REMOTE_ROOT/releases/$VERSION"/qiaoya-* "$REMOTE_ROOT/latest"/qiaoya-* "$REMOTE_ROOT/install.sh"
          chmod 644 "$REMOTE_ROOT/install.ps1" "$REMOTE_ROOT/releases/$VERSION"/checksums.txt "$REMOTE_ROOT/releases/$VERSION"/version.json "$REMOTE_ROOT/latest"/checksums.txt "$REMOTE_ROOT/latest"/version.json "$REMOTE_ROOT/releases/$VERSION"/install.sh "$REMOTE_ROOT/releases/$VERSION"/install.ps1
          if id www >/dev/null 2>&1; then
            chown -R www:www "$REMOTE_ROOT/releases/$VERSION" "$REMOTE_ROOT/latest" "$REMOTE_ROOT/install.sh" "$REMOTE_ROOT/install.ps1"
          fi
          rm -rf "$REMOTE_ROOT/incoming/$VERSION"
          REMOTE

      - name: Verify public install endpoint
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          curl -fsSL https://code.xhyovo.cn/install | head -n 5
          curl -fsSL https://code.xhyovo.cn/install.ps1 | head -n 5
          curl -fsI https://code.xhyovo.cn/downloads/qiaoya/latest/checksums.txt
          curl -fsSL https://code.xhyovo.cn/downloads/qiaoya/latest/version.json
