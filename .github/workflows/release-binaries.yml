name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.2.0"
        required: true
        type: string

concurrency:
  group: release-binaries
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: |
          go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.event.inputs.tag_name || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          build() {
            goos="$1"
            goarch="$2"
            asset="$3"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags "-s -w -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Version=${VERSION} -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Commit=${COMMIT} -X github.com/xhyqaq/qiaoya-cli/internal/qiaoya/metadata.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "dist/$asset" ./cmd/qiaoya
          }
          build darwin arm64 qiaoya-darwin-arm64
          build darwin amd64 qiaoya-darwin-amd64
          build linux amd64 qiaoya-linux-amd64
          build linux arm64 qiaoya-linux-arm64
          build windows amd64 qiaoya-windows-amd64.exe
          build windows arm64 qiaoya-windows-arm64.exe

      - name: Verify Linux binary
        run: |
          ./dist/qiaoya-linux-amd64 --help

      - name: Generate checksums
        run: |
          cd dist
          sha256sum qiaoya-* > checksums.txt

      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiaoya-release-assets
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p flattened
          find release-assets -maxdepth 2 -type f -exec cp {} flattened/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: flattened/*
          generate_release_notes: true
