name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: qiaoya-linux-x64
            binary_path: dist/qiaoya
          - os: windows-latest
            asset_name: qiaoya-windows-x64.exe
            binary_path: dist/qiaoya.exe
          - os: macos-13
            asset_name: qiaoya-darwin-x64
            binary_path: dist/qiaoya
          - os: macos-14
            asset_name: qiaoya-darwin-arm64
            binary_path: dist/qiaoya

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e ./agent-harness

      - name: Build binary
        run: |
          pyinstaller --clean --onefile --name qiaoya agent-harness/cli_anything/qiaoya/qiaoya_cli.py --paths agent-harness

      - name: Verify binary
        shell: bash
        run: |
          "${{ matrix.binary_path }}" --help

      - name: Package asset
        shell: bash
        run: |
          cp "${{ matrix.binary_path }}" "${{ matrix.asset_name }}"

      - name: Upload asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p flattened
          find release-assets -type f -maxdepth 2 -exec cp {} flattened/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: flattened/*
          generate_release_notes: true
