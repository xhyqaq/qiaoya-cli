name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Verify CLI build
        run: |
          go build -o "${RUNNER_TEMP}/qiaoya" ./cmd/qiaoya
          "${RUNNER_TEMP}/qiaoya" --help
          "${RUNNER_TEMP}/qiaoya" install --dry-run --agents codex,claude,cursor,windsurf,openclaw --project-dir "$PWD"

      - name: Check install script syntax
        run: bash -n scripts/install.sh
